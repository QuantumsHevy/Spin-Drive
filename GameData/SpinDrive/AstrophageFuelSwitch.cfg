// Adds Enriched Astrophage to most B9PartSwitch tanks using the LF/O subtype as a detector.
@PART:HAS[#massOffset,#costOffset,@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch],@SUBTYPE[LF/O]]]:AFTER[zzz_CryoTanks]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch],@SUBTYPE[LF/O]]
    {
        SUBTYPE
        {
            name = EnrichedAstrophage
            title = Enriched Astrophage
            tankType = EnrichedAstrophage
            addedMass = #$../../massOffset$
            addedCost = #$../../costOffset$
            primaryColor = #A30316
            secondaryColor = #4F010B
        }
    }
}

// Adds Enriched Astrophage to CryoTanks-native switchers (subtype LH2/O) that the LF/O check in the previous patch cannot reach. See #4.
@PART:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch],@SUBTYPE[LH2/O],!SUBTYPE[LF/O]]]:NEEDS[CryoTanks,B9PartSwitch]:AFTER[zzz_CryoTanks]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]
    {
        SUBTYPE
        {
            name = EnrichedAstrophage
            title = Enriched Astrophage
            tankType = EnrichedAstrophage
            primaryColor = #A30316
            secondaryColor = #4F010B
        }
    }
}

// A third patch to catch the fuel tanks from NearFutureExploration should be written in the future, as those tanks also directly change the model along with the fuel type. This is a more complex case that will require a different approach than the two patches above.