// Adds Enriched Astrophage to most B9PartSwitch tanks using the LF/O subtype as a detector.
@PART:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch],@SUBTYPE[LF/O]]]:AFTER[zzz_CryoTanks]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch],@SUBTYPE[LF/O]]
    {
        +SUBTYPE[LF/O]
        {
            %name = EnrichedAstrophage
            %title = Enriched Astrophage
            %tankType = EnrichedAstrophage
            %primaryColor = #C7283B
            %secondaryColor = #74131D
        }
    }
}

// Adds Enriched Astrophage to CryoTanks-native switchers (subtype LH2) that the LF/O check in the previous patch cannot reach. See #4.
@PART:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch],@SUBTYPE[LH2],!SUBTYPE[LF/O]]]:NEEDS[CryoTanks,B9PartSwitch]:AFTER[zzz_CryoTanks]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]
    {
        +SUBTYPE[LH2]
        {
            %name = EnrichedAstrophage
            %title = Enriched Astrophage
            %tankType = EnrichedAstrophage
            %primaryColor = #C7283B
            %secondaryColor = #74131D
        }
    }
}

// Adds Enriched Astrophage to KSPIE-patched B9PartSwitch tanks that the standard fuelSwitch patches cannot reach. See #10.
@PART:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[KSPIE],@SUBTYPE[LF/O]]]:NEEDS[WarpPlugin]:AFTER[zzz_CryoTanks]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[KSPIE],@SUBTYPE[LF/O]]
    {
        +SUBTYPE[LF/O]
        {
            %name = EnrichedAstrophage
            %title = Enriched Astrophage
            %tankType = EnrichedAstrophage
            %primaryColor = #A30316
            %secondaryColor = #4F010B
        }
    }
}

