/// Adds parts of this mod to VABOrganizer categories
@PART[SpinDrive,SpinDriveCluster]:FOR[SpinDrive]:NEEDS[VABOrganizer]
{
  %VABORGANIZER
  {
    %organizerSubcategory = spinDrives
  }
}

@PART[AstrophageGenerator]:FOR[SpinDrive]:NEEDS[VABOrganizer]
{
  %VABORGANIZER
  {
    %organizerSubcategory = fuelCells
  }
}