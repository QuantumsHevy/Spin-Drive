PART
{
	name = AstrophageGenerator
	module = Part
	author = NoLifeJordan
  MODEL
	{
		model = SpinDrive/Parts/Generators/AstrophageGenerator
		scale = 1.0, 1.0, 1.0
		rotation = 0, 0, 270
	}
	rescaleFactor = 1

	mass = 0.02

	// heatConductivity = 100.06 // half default
	emissiveConstant = 0.8 // engine nozzles are good at radiating.
	dragModelType = default
	maximum_drag = 0.2
	minimum_drag = 0.2
	angularDrag = 2
	breakingForce = 400
	breakingTorque = 400
	crashTolerance = 22
	maxTemp = 3600 // = 3600
	TechRequired = precisionPropulsion
	entryCost = 1100
	cost = 200
	category = Electrical
	subcategory = 0
	title =  "Pepper" Astrophage Fuel Cell
	manufacturer = Project Hail Mary
	description = "Perfect energy storage! Imagine a battery-powered household. Like- you have a double-A battery, but full of Astrophage. That'd last your house about a hundred thousand years. Imagine buying a car and never having to charge it up? The entire concept of power grids is going to end." - Dr. Steve Hatch
	bulkheadProfiles = srf
	attachRules = 0,1,0,1,1
	tags = astrophage 
	MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Fuel Cell
		StartActionName = Start Fuel Cell
		StopActionName = Stop Fuel Cell
		ToggleActionName = Toggle Fuel Cell
		FillAmount = 1.0
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = false
		INPUT_RESOURCE
		{
			ResourceName = EnrichedAstrophage
			Ratio = 0.000001
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 1000
			DumpExcess = false
		}
	}
}
