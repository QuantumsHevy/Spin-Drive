	manufacturer = Project Hail Mary
	description = A spin drive uses a three-phase cycle to achieve this: first, it attracts Astrophage fuel to coat one side of a transparent triangular drive mechanism using low-intensity light then rotates the now coated surface to be exposed to space and increases the intensity of said light to cause the Astrophage to "push" even harder against the slide, imparting momentum to the craft; and finally the slide is rotated back into the engine housing where the now "dead" Astrophage is scraped off to allow the cycle to repeat.
