name: Package and release mod ZIP

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set ZIP file name
        id: naming
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "zip_name=SpinDrive-${{ github.event.release.tag_name }}.zip" >> "$GITHUB_OUTPUT"
          else
            echo "zip_name=SpinDrive-manual-test-${{ github.run_number }}.zip" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy docs into mod folder
        run: |
          for f in README.md LICENSE CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" GameData/SpinDrive/ || echo "Skipping $f (not found at repo root)"
          done

      - name: Zip only GameData contents
        run: |
          cd GameData
          zip -r "../${{ steps.naming.outputs.zip_name }}" .

      - name: Verify no wrapper folders
        run: |
          TOP_LEVEL=$(unzip -Z1 "${{ steps.naming.outputs.zip_name }}" | cut -d/ -f1 | sort -u)
          echo "Top-level entries found in zip:"
          echo "$TOP_LEVEL"
          if [ "$TOP_LEVEL" != "SpinDrive" ]; then
            echo "::error::Expected the zip's only top-level folder to be 'SpinDrive'. Found: $TOP_LEVEL"
            exit 1
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.naming.outputs.zip_name }}
          path: ${{ steps.naming.outputs.zip_name }}

      - name: Attach ZIP to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ steps.naming.outputs.zip_name }}